<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>咕咕嘎嘎聊天室</title>
<style>
  :root {
    --bg: #1a1a2e;
    --chat-bg: #16213e;
    --ai-bubble: #0f3460;
    --user-bubble: #533483;
    --text: #e0e0e0;
    --accent: #e94560;
    --accent2: #f5c518;
    --border: #2a2a4a;
    --timestamp: #8888aa;
    --input-bg: #1a1a2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── 整体容器 ── */
  #app {
    display: flex;
    flex-direction: column;
    width: 100%; height: 100%;
    max-width: 100vw; max-height: 100vh;
  }

  /* ── 顶部标题栏 ── */
  #header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--chat-bg);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  #header .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  #header .title {
    font-size: 16px; font-weight: 700;
    color: var(--accent2);
  }
  #header .subtitle {
    font-size: 12px; color: var(--timestamp);
    margin-left: auto;
  }

  /* ── 聊天区域 ── */
  #chat-scroll {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    /* 禁止下拉加载 */
    overscroll-behavior-y: contain;
    -webkit-overflow-scrolling: touch;
  }
  /* 隐藏下拉刷新指示器 */
  #chat-scroll::-webkit-scrollbar { width: 6px; }
  #chat-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #chat-scroll::-webkit-scrollbar-track { background: transparent; }

  #messages {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0 8px;
    /* 关键：让消息容器撑到最底部 */
    min-height: 100%;
    justify-content: flex-end;
  }

  /* ── 每条消息的外层 wrapper ── */
  .msg-wrapper {
    display: flex;
    width: 100%;
    flex-shrink: 0;
  }
  .msg-wrapper.ai { justify-content: flex-start; }
  .msg-wrapper.user { justify-content: flex-end; }

  /* ── 消息气泡本体 ── */
  .msg-bubble {
    /* 核心：占可视窗口 90% */
    width: 90%;
    min-width: 85%;
    max-width: 90%;
    padding: 14px 16px;
    border-radius: 14px;
    line-height: 1.65;
    word-break: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
    position: relative;
    font-size: 14px;
  }

  .msg-wrapper.ai .msg-bubble {
    background: var(--ai-bubble);
    border-bottom-left-radius: 4px;
    margin-left: 0;
    /* 左贴边 */
    align-self: flex-start;
  }

  .msg-wrapper.user .msg-bubble {
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
    margin-right: 0;
    align-self: flex-end;
  }

  /* ── 时间戳 ── */
  .msg-time {
    font-size: 11px;
    color: var(--timestamp);
    margin-top: 6px;
    text-align: right;
    opacity: 0.8;
  }

  /* ── 头像小标 ── */
  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    margin: 0 6px;
    align-self: flex-end;
    margin-bottom: 2px;
  }
  .msg-wrapper.ai .msg-avatar { background: #0f3460; }
  .msg-wrapper.user .msg-avatar { background: #533483; }

  /* ── 正在输入动画 ── */
  #typing-indicator {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    margin-bottom: 8px;
    color: var(--timestamp);
    font-size: 13px;
  }
  #typing-indicator.show { display: flex; }
  .typing-dots { display: flex; gap: 4px; }
  .typing-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    animation: bounce 0.6s infinite alternate;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    to { transform: translateY(-6px); opacity: 0.4; }
  }

  /* ── 底部输入区 ── */
  #input-area {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--chat-bg);
    border-top: 1px solid var(--border);
    z-index: 10;
  }
  #input-box {
    flex: 1;
    padding: 12px 16px;
    border-radius: 22px;
    border: 1.5px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    resize: none;
    max-height: 120px;
  }
  #input-box:focus { border-color: var(--accent2); }
  #input-box::placeholder { color: #555; }

  #send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--accent2);
    color: #1a1a2e;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
  }
  #send-btn:hover { transform: scale(1.08); }
  #send-btn:active { transform: scale(0.94); opacity: 0.8; }
  #send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* ── 移动端适配 ── */
  @media (max-width: 480px) {
    .msg-bubble { font-size: 13px; padding: 12px 14px; }
    #header { padding: 10px 12px; }
    #input-area { padding: 8px 12px; gap: 8px; }
  }
</style>
</head>

/* ── 智能匹配回复 ── */
function findReply(userInput) {
  const lower = userInput.toLowerCase();
  // 按匹配关键词数量排序
  let best = null;
  let bestScore = 0;
  for (const entry of responseDB) {
    let score = 0;
    for (const key of entry.keys) {
      if (lower.includes(key)) score++;
    }
    if (score > bestScore) {
      bestScore = score;
      best = entry;
    }
  }
  if (best && bestScore > 0) return best.reply;
  // 随机默认回复
  return fallbackReplies[Math.floor(Math.random() * fallbackReplies.length)];
}

/* ── 获取当前时间戳 ── */
function getTimeStr() {
  const now = new Date();
  return now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

/* ── 滚动到底部 ── */
function scrollToBottom(smooth) {
  requestAnimationFrame(() => {
    chatScroll.scrollTo({
      top: chatScroll.scrollHeight,
      behavior: smooth ? 'smooth' : 'instant'
    });
  });
}

/* ── 添加消息到界面 ── */
function addMessage(text, type) {
  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${type}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = type === 'ai' ? '🐧' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  // 处理换行
  bubble.innerHTML = text.replace(/\n/g, '<br>') +
    `<div class="msg-time">${getTimeStr()}</div>`;

  wrapper.appendChild(type === 'ai' ? avatar : bubble);
  wrapper.appendChild(type === 'ai' ? bubble : avatar);

  messagesEl.appendChild(wrapper);
  scrollToBottom(true);
}

/* ── 发送消息 ── */
async function sendMessage() {
  const text = inputBox.value.trim();
  if (!text) return;

  // 禁用输入
  inputBox.disabled = true;
  sendBtn.disabled = true;
  inputBox.value = '';

  // 添加用户消息
  addMessage(text, 'user');

  // 显示打字动画
  typingIndicator.classList.add('show');
  scrollToBottom(true);

  // 模拟AI思考延迟
  const delay = 800 + Math.random() * 1500;
  await new Promise(r => setTimeout(r, delay));

  // 隐藏打字动画
  typingIndicator.classList.remove('show');

  // 生成并添加AI回复
  const reply = findReply(text);
  addMessage(reply, 'ai');

  // 恢复输入
  inputBox.disabled = false;
  sendBtn.disabled = false;
  inputBox.focus();
}

/* ── 事件绑定 ── */
sendBtn.addEventListener('click', sendMessage);
inputBox.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

/* ── 初始化 ── */
scrollToBottom(false);
inputBox.focus();

/* ── 窗口大小改变时重新贴底 ── */
window.addEventListener('resize', () => scrollToBottom(false));

/* ── 禁止下拉加载历史（阻止touchmove下拉） ── */
let touchStartY = 0;
chatScroll.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

chatScroll.addEventListener('touchmove', (e) => {
  const scrollTop = chatScroll.scrollTop;
  const touchY = e.touches[0].clientY;
  // 如果在顶部且向下拉，阻止
  if (scrollTop <= 0 && touchY > touchStartY) {
    e.preventDefault();
  }
}, { passive: false });
